</head>
<body>
<canvas id="particles"></canvas>

<header class="header">
  <div class="header-left">
    <a href="index.html" class="logo" aria-label="Panda Games home">
      <img src="assets/logo.png" height="32" />
    </a>
  </div>

  <div class="search-wrap">
    <i data-lucide="search" class="search-icon" width="18" height="18"></i>
    <input id="searchInput" type="search" placeholder="Search games..." autocomplete="off" />
  </div>

  <div class="header-right">
    <button class="pill-btn" id="randomBtn" title="Random game (R)">
      <i data-lucide="shuffle" width="16" height="16"></i>
      <span>Random</span>
    </button>
    <button class="pill-btn hide-btn" id="hideBtn">
      <i data-lucide="eye-off" width="16" height="16"></i>
      <span>Hide My Tab</span>
    </button>
  </div>
</header>

<aside class="sidebar" id="sidebar">
  <nav class="side-nav" id="sideNav"></nav>
</aside>

<main class="main" id="main">
  <!-- Game view -->
  <section class="game-view hidden" id="gameView">
    <div class="player-shell">
      <div class="player-frame" id="playerFrame">
        <div class="player-loading"><div class="spinner"></div><span>Loading game...</span></div>
      </div>
      <div class="player-meta">
        <img id="gameMetaThumb" alt="" />
        <div class="player-meta-info">
          <h1 id="gameTitle">Game</h1>
          <div id="gameLabels" class="labels"></div>
          <p id="gameDescription">Enjoy this awesome game on Panda Games. Compete, explore and have fun!</p>
          <div class="player-actions">
            <button class="btn-accent" id="fullscreenBtn"><i data-lucide="maximize" width="16" height="16"></i>Fullscreen</button>
            <button class="btn-ghost" id="favBtn"><i data-lucide="star" width="16" height="16"></i>Favorite</button>
          </div>
        </div>
      </div>
    </div>
    <section class="row">
      <div class="row-head"><h2>Related games</h2></div>
      <div class="grid" id="relatedGrid"></div>
    </section>
  </section>

  <!-- Browse view -->
  <section class="browse-view" id="browseView">
    <section class="hero" id="hero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <span class="hero-tag">Featured</span>
        <h1 id="heroTitle">Loading featured game…</h1>
        <p id="heroDesc">Discover the hottest games this week on Panda Games.</p>
        <div class="hero-actions">
          <button class="btn-accent" id="heroPlay"><i data-lucide="play" width="16" height="16"></i>Play Now</button>
          <button class="btn-ghost" id="heroRandom"><i data-lucide="dices" width="16" height="16"></i>Surprise me</button>
        </div>
      </div>
      <div class="hero-thumb" id="heroThumb"></div>
    </section>

    <section class="row" id="recentRow" hidden>
      <div class="row-head"><h2>Recently played</h2><span class="row-sub" id="recentCount"></span></div>
      <div class="grid grid-scroll" id="recentGrid"></div>
    </section>

    <section class="row" id="favRow" hidden>
      <div class="row-head"><h2>Your favorites</h2></div>
      <div class="grid grid-scroll" id="favGrid"></div>
    </section>

    <section class="row">
      <div class="row-head">
        <h2 id="gridHeading">All games</h2>
        <span class="row-sub" id="gameCount"></span>
      </div>
      <div class="grid" id="gamesGrid"></div>
      <div class="empty hidden" id="emptyState">
        <div class="empty-icon"><i data-lucide="ghost" width="48" height="48" stroke-width="1.5"></i></div>
        <h3>No games found</h3>
        <p>Try a different search or category.</p>
      </div>
    </section>
  </section>
</main>

<nav class="bottom-nav">
  <button data-cat="Trending"><i data-lucide="flame" width="20" height="20"></i>Trending</button>
  <button data-cat="IO"><i data-lucide="globe" width="20" height="20"></i>IO</button>
  <button data-cat="Action"><i data-lucide="swords" width="20" height="20"></i>Action</button>
  <button data-cat="Racing"><i data-lucide="car" width="20" height="20"></i>Racing</button>
  <button data-cat="Puzzle"><i data-lucide="puzzle" width="20" height="20"></i>Puzzle</button>
</nav>

<div class="toast-wrap" id="toastWrap"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="script.js"></script>
</body>
</html>
